<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PlayerMS — Player Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --clr-pitch:#0d1f14;--clr-turf:#132a1b;--clr-surface:#1b3325;
      --clr-lift:#22402f;--clr-border:#2e5540;--clr-accent:#3ecf74;
      --clr-gold:#f5c842;--clr-amber:#f09d3b;--clr-red:#e05252;--clr-blue:#5aacf5;
      --txt-primary:#e8f5ee;--txt-secondary:#8db8a0;--txt-muted:#5a8070;
      --radius-sm:6px;--radius-md:10px;--radius-lg:14px;
      --sidebar-w:210px;--detail-w:250px;--transition:150ms ease;
      font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
      font-size:14px;color:var(--txt-primary);background:var(--clr-pitch);
    }
    .app{display:flex;block-size:100vh;overflow:hidden}

    /* Sidebar */
    .sidebar{inline-size:var(--sidebar-w);flex-shrink:0;background:var(--clr-turf);
      border-inline-end:1px solid var(--clr-border);display:flex;flex-direction:column}
    .sidebar-logo{display:flex;align-items:center;gap:10px;padding:18px;
      border-block-end:1px solid var(--clr-border);font-size:17px;font-weight:700;
      color:var(--clr-accent)}
    .nav-section-label{font-size:10px;font-weight:600;letter-spacing:.08em;
      color:var(--txt-muted);padding:16px 18px 5px;text-transform:uppercase}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;
      font-size:13px;color:var(--txt-secondary);cursor:pointer;
      border-inline-start:3px solid transparent;transition:all var(--transition)}
    .nav-item i{font-size:17px;opacity:.8}
    .nav-item:hover{background:var(--clr-surface);color:var(--txt-primary)}
    .nav-item.active{background:rgba(62,207,116,.1);color:var(--clr-accent);
      border-inline-start-color:var(--clr-accent);font-weight:600}
    .sidebar-footer{margin-block-start:auto;border-block-start:1px solid var(--clr-border);padding-block:10px}

    /* Main */
    .main{flex:1;display:flex;flex-direction:column;min-inline-size:0;overflow:hidden}
    .topbar{display:flex;align-items:center;justify-content:space-between;
      padding:12px 20px;border-block-end:1px solid var(--clr-border);
      background:var(--clr-turf);gap:12px;flex-shrink:0}
    .topbar-title{font-size:17px;font-weight:700}
    .topbar-right{display:flex;align-items:center;gap:8px}
    .search-box{display:flex;align-items:center;gap:6px;background:var(--clr-surface);
      border:1px solid var(--clr-border);border-radius:var(--radius-sm);padding:7px 11px}
    .search-box i{font-size:14px;color:var(--txt-muted)}
    .search-box input{background:none;border:none;outline:none;font-size:13px;
      color:var(--txt-primary);inline-size:160px}
    .search-box input::placeholder{color:var(--txt-muted)}
    .btn{display:inline-flex;align-items:center;gap:5px;border:none;
      border-radius:var(--radius-sm);padding:7px 14px;font-size:13px;
      font-weight:600;cursor:pointer;transition:all var(--transition)}
    .btn:active{transform:scale(.97)}
    .btn-primary{background:var(--clr-accent);color:#0d1f14}
    .btn-primary:hover{background:#4fe083}
    .btn-ghost{background:var(--clr-surface);color:var(--txt-secondary);border:1px solid var(--clr-border)}
    .btn-ghost:hover{background:var(--clr-lift);color:var(--txt-primary)}
    .btn-danger{background:rgba(224,82,82,.15);color:var(--clr-red);border:1px solid rgba(224,82,82,.3)}
    .btn-danger:hover{background:rgba(224,82,82,.25)}
    .btn-sm{padding:5px 10px;font-size:12px}

    /* Content */
    .content{flex:1;overflow-y:auto;padding:18px 20px}

    /* Stat cards */
    .stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-block-end:18px}
    .stat-card{background:var(--clr-surface);border:1px solid var(--clr-border);
      border-radius:var(--radius-md);padding:14px 16px}
    .stat-label{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt-muted);
      text-transform:uppercase;letter-spacing:.06em;margin-block-end:5px}
    .stat-value{font-size:24px;font-weight:700;letter-spacing:-.5px;line-height:1}
    .stat-sub{font-size:11px;color:var(--txt-muted);margin-block-start:3px}
    .stat-sub.up{color:var(--clr-accent)}.stat-sub.down{color:var(--clr-red)}

    /* Tabs */
    .tabs{display:flex;border-block-end:1px solid var(--clr-border);margin-block-end:14px}
    .tab{padding:8px 16px;font-size:13px;color:var(--txt-muted);cursor:pointer;
      border-block-end:2px solid transparent;margin-block-end:-1px;transition:all var(--transition)}
    .tab:hover{color:var(--txt-primary)}
    .tab.active{color:var(--clr-accent);border-block-end-color:var(--clr-accent);font-weight:600}

    /* Filter row */
    .filter-row{display:flex;align-items:center;gap:7px;margin-block-end:14px;flex-wrap:wrap}
    .filter-label{font-size:12px;color:var(--txt-muted)}
    .pill{font-size:11px;padding:3px 11px;border-radius:20px;cursor:pointer;
      border:1px solid var(--clr-border);color:var(--txt-secondary);background:var(--clr-surface);
      transition:all var(--transition)}
    .pill:hover{border-color:var(--clr-accent);color:var(--clr-accent)}
    .pill.active{background:rgba(62,207,116,.15);color:var(--clr-accent);
      border-color:var(--clr-accent);font-weight:600}
    .sort-select{margin-inline-start:auto;font-size:12px;border:1px solid var(--clr-border);
      border-radius:var(--radius-sm);padding:4px 9px;background:var(--clr-surface);
      color:var(--txt-secondary);cursor:pointer;outline:none}

    /* Player grid */
    .players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
    .player-card{background:var(--clr-surface);border:1px solid var(--clr-border);
      border-radius:var(--radius-lg);padding:14px;cursor:pointer;
      transition:all var(--transition)}
    .player-card:hover{border-color:#3a6b50;background:var(--clr-lift);transform:translateY(-1px)}
    .player-card.selected{border-color:var(--clr-accent);background:rgba(62,207,116,.06)}
    .player-header{display:flex;align-items:center;gap:10px;margin-block-end:10px}
    .avatar{inline-size:38px;block-size:38px;border-radius:50%;display:flex;
      align-items:center;justify-content:center;font-size:13px;font-weight:700;
      flex-shrink:0;border:2px solid transparent}
    .av-1{background:#1a3d2e;color:var(--clr-accent);border-color:rgba(62,207,116,.3)}
    .av-2{background:#1f2e3d;color:var(--clr-blue);border-color:rgba(90,172,245,.3)}
    .av-3{background:#3d2c1a;color:var(--clr-amber);border-color:rgba(240,157,59,.3)}
    .av-4{background:#3d1a1a;color:var(--clr-red);border-color:rgba(224,82,82,.3)}
    .av-5{background:#2e1f3d;color:#c084fc;border-color:rgba(192,132,252,.3)}
    .av-6{background:#1a2e3d;color:#38bdf8;border-color:rgba(56,189,248,.3)}
    .av-7{background:#3d2e1a;color:var(--clr-gold);border-color:rgba(245,200,66,.3)}
    .av-8{background:#1a3d3a;color:#2dd4bf;border-color:rgba(45,212,191,.3)}
    .player-name{font-size:14px;font-weight:600;line-height:1.2}
    .player-pos{font-size:11px;color:var(--txt-muted);margin-block-start:1px}
    .mv-badge{margin-inline-start:auto;font-size:12px;font-weight:700;
      padding:2px 8px;border-radius:20px}
    .mv-high{background:rgba(245,200,66,.15);color:var(--clr-gold)}
    .mv-mid{background:rgba(240,157,59,.12);color:var(--clr-amber)}
    .mv-low{background:rgba(224,82,82,.12);color:var(--clr-red)}
    .card-meta{display:flex;flex-direction:column;gap:4px}
    .meta-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
    .meta-k{color:var(--txt-muted)}.meta-v{color:var(--txt-primary);font-weight:500}
    .dot{inline-size:7px;block-size:7px;border-radius:50%;display:inline-block;margin-inline-end:4px}
    .dot-active{background:var(--clr-accent)}.dot-injured{background:var(--clr-red)}.dot-bench{background:var(--clr-amber)}
    .bar-wrap{block-size:4px;background:var(--clr-pitch);border-radius:2px;margin-block-start:3px;overflow:hidden}
    .bar-fill{block-size:100%;border-radius:2px;transition:inline-size .4s ease}
    .bar-green{background:var(--clr-accent)}.bar-gold{background:var(--clr-gold)}
    .bar-amber{background:var(--clr-amber)}.bar-red{background:var(--clr-red)}
    .trend-up{color:var(--clr-accent);font-size:11px}
    .trend-down{color:var(--clr-red);font-size:11px}
    .trend-flat{color:var(--txt-muted);font-size:11px}

    /* Detail panel */
    .detail-panel{inline-size:var(--detail-w);flex-shrink:0;
      border-inline-start:1px solid var(--clr-border);background:var(--clr-turf);
      display:flex;flex-direction:column;overflow:hidden}
    .detail-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
    .dp-header{display:flex;align-items:center;gap:10px}
    .dp-name{font-size:15px;font-weight:700}
    .dp-sub{font-size:11px;color:var(--txt-muted);margin-block-start:2px}
    .section-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
      color:var(--txt-muted);margin-block-end:7px}
    .dp-mv-big{font-size:26px;font-weight:800;letter-spacing:-1px;line-height:1}
    .sparkline{display:flex;align-items:flex-end;gap:3px;block-size:28px;margin-block-start:6px}
    .sp-bar{flex:1;border-radius:2px 2px 0 0;background:var(--clr-surface);min-block-size:3px}
    .sp-bar.current{background:var(--clr-accent)}
    .sp-label{display:flex;justify-content:space-between;font-size:10px;color:var(--txt-muted);margin-block-start:2px}
    .rel-chip{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--txt-secondary);
      background:var(--clr-surface);border:1px solid var(--clr-border);
      border-radius:var(--radius-sm);padding:5px 9px;margin-block-end:4px}
    .rel-chip i{font-size:14px;color:var(--txt-muted)}
    .dp-meta-row{display:flex;justify-content:space-between;font-size:12px;margin-block-end:4px}
    .dp-meta-k{color:var(--txt-muted)}.dp-meta-v{font-weight:600}
    .action-row{display:flex;gap:6px;padding:12px 16px;border-block-start:1px solid var(--clr-border);flex-shrink:0}
    .action-row .btn{flex:1;justify-content:center;font-size:12px}
    .empty-state{font-size:12px;color:var(--txt-muted);line-height:1.7;padding:16px}

    /* Modal */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
      z-index:100;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:var(--clr-turf);border:1px solid var(--clr-border);
      border-radius:var(--radius-lg);padding:24px;inline-size:420px;max-inline-size:95vw;
      max-block-size:90vh;overflow-y:auto}
    .modal-title{font-size:16px;font-weight:700;margin-block-end:18px;
      display:flex;align-items:center;justify-content:space-between}
    .modal-title button{background:none;border:none;color:var(--txt-muted);
      font-size:20px;cursor:pointer;line-height:1}
    .form-group{margin-block-end:13px}
    .form-label{display:block;font-size:12px;color:var(--txt-secondary);margin-block-end:5px;font-weight:500}
    .form-input{inline-size:100%;background:var(--clr-surface);border:1px solid var(--clr-border);
      border-radius:var(--radius-sm);padding:8px 11px;font-size:13px;color:var(--txt-primary);outline:none}
    .form-input:focus{border-color:var(--clr-accent)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .form-actions{display:flex;gap:8px;margin-block-start:18px;justify-content:flex-end}

    /* League / Transfer section */
    .league-grid{display:flex;flex-direction:column;gap:10px}
    .league-card{background:var(--clr-surface);border:1px solid var(--clr-border);
      border-radius:var(--radius-md);padding:14px 16px}
    .league-card-header{display:flex;align-items:center;justify-content:space-between;margin-block-end:8px}
    .league-name{font-size:14px;font-weight:600}
    .league-meta{font-size:12px;color:var(--txt-muted);display:flex;gap:12px;margin-block-end:8px}
    .league-actions{display:flex;gap:6px}
    .transfer-card{background:var(--clr-surface);border:1px solid var(--clr-border);
      border-radius:var(--radius-md);padding:14px 16px;margin-block-end:10px}
    .transfer-title{font-size:14px;font-weight:600;margin-block-end:10px;
      display:flex;align-items:center;gap:7px}
    .notice{background:rgba(62,207,116,.08);border:1px solid rgba(62,207,116,.2);
      border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;
      color:var(--txt-secondary);margin-block-end:12px}
    .notice.warn{background:rgba(240,157,59,.08);border-color:rgba(240,157,59,.2);color:var(--clr-amber)}
    .notice.err{background:rgba(224,82,82,.08);border-color:rgba(224,82,82,.2);color:var(--clr-red)}
    .hidden{display:none}
    @media(max-width:900px){.detail-panel{display:none}.stats-row{grid-template-columns:1fr 1fr}}
    @media(max-width:600px){.sidebar{inline-size:52px}.sidebar-logo span,.nav-item span,.nav-section-label{display:none}
      .sidebar-logo{justify-content:center;padding:14px 0}.nav-item{justify-content:center;padding-inline:0}
      .stats-row{grid-template-columns:1fr 1fr}.content{padding:12px}}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{transition:none!important}}
  </style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar" aria-label="Navigation">
    <div class="sidebar-logo"><i class="ti ti-tournament" aria-hidden="true"></i><span>PlayerMS</span></div>
    <div class="nav-section-label">Main</div>
    <div class="nav-item active" onclick="showView('players',this)"><i class="ti ti-users" aria-hidden="true"></i><span>Players</span></div>
    <div class="nav-item" onclick="showView('leagues',this)"><i class="ti ti-trophy" aria-hidden="true"></i><span>Leagues</span></div>
    <div class="nav-item" onclick="showView('transfer',this)"><i class="ti ti-arrows-exchange" aria-hidden="true"></i><span>Transfers</span></div>
    <div class="nav-section-label">Finance</div>
    <div class="nav-item" onclick="showView('contracts',this)"><i class="ti ti-file-text" aria-hidden="true"></i><span>Contracts</span></div>
    <div class="nav-section-label">Insights</div>
    <div class="nav-item" onclick="showView('stats',this)"><i class="ti ti-chart-bar" aria-hidden="true"></i><span>Stats</span></div>
    <div class="sidebar-footer">
      <div class="nav-item" onclick="showView('players',this)"><i class="ti ti-settings" aria-hidden="true"></i><span>Settings</span></div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="topbar">
      <div class="topbar-title" id="page-title">Players</div>
      <div class="topbar-right">
        <div class="search-box" id="search-wrap">
          <i class="ti ti-search" aria-hidden="true"></i>
          <input type="search" id="search-input" placeholder="Search…" aria-label="Search" oninput="renderGrid()">
        </div>
        <button class="btn btn-primary" id="btn-add" onclick="openAddModal()">
          <i class="ti ti-plus" aria-hidden="true"></i> <span id="btn-add-label">Add player</span>
        </button>
      </div>
    </header>
    <main class="content" id="main-content">
      <!-- views rendered here -->
    </main>
  </div>

  <!-- Detail Panel -->
  <aside class="detail-panel" id="detail-panel" aria-label="Player details">
    <div class="empty-state">Select a player to view details, edit, or transfer them.</div>
  </aside>
</div>

<!-- ── Modal ─────────────────────────────────────── -->
<div class="modal-bg" id="modal-bg" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal-box">
    <div class="modal-title">
      <span id="modal-title-text">Add Player</span>
      <button onclick="closeModal()" aria-label="Close">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
/* BACKEND LAYER (mirrors Java architecture)
   ① Inheritance  ② Aggregation  ③ Composition
   ④ Association  ⑤ Dependency (StatsService) */

// ── ⑤ StatsService (Dependency)
const StatsService = {
  calculateRating(goals, assists, minutes, yellows, reds) {
    if (minutes <= 0) return 0;
    const base    = 5.0;
    const bonus   = goals * 0.30 + assists * 0.20;
    const minFac  = Math.min(minutes / 900, 1) * 1.5;
    const penalty = yellows * 0.10 + reds * 0.40;
    return Math.max(0, Math.min(10, Math.round((base + bonus + minFac - penalty) * 10) / 10));
  },
  estimateMarketValue(rating, age, position) {
    const pos  = { FWD:1.30, MID:1.10, DEF:1.00, GK:0.90 }[position] || 1.0;
    const diff = Math.abs(age - 26);
    let   ageFac = diff === 0 ? 1.00 : diff === 1 ? 0.97 : diff === 2 ? 0.93 : diff <= 4 ? 0.87 : 0.75;
    if (age <= 21) ageFac = Math.min(ageFac + 0.10, 1.05);
    return Math.round(rating * rating * pos * ageFac * 10) / 10;
  },
  valueTrend(history) {
    if (!history || history.length < 2) return 0;
    return Math.round((history[history.length-1] - history[history.length-2]) * 10) / 10;
  }
};

// ── In-memory stores (Repositories) ──────────────────
let _pid = 10, _tid = 5, _lid = 3, _cid = 5;

// ② Aggregation: League holds teamIds (loose reference)
const leagues = [
  { id:1, name:"Premier League",  country:"England", season:"2025/26", division:1, teamIds:[1,2] },
  { id:2, name:"Division 1",      country:"England", season:"2025/26", division:2, teamIds:[3,4] },
];

// ③ Composition: Team owns contracts array (contracts die with team)
const teams = [
  { id:1, name:"FC United",  city:"Manchester", budget:150e6, leagueId:1,
    contracts:[{id:1,salary:85000,start:"2023-07-01",end:"2026-06-30",status:"ACTIVE"}] },
  { id:2, name:"City FC",    city:"Manchester", budget:200e6, leagueId:1,
    contracts:[{id:2,salary:70000,start:"2023-01-01",end:"2025-06-30",status:"ACTIVE"}] },
  { id:3, name:"Rovers SC",  city:"Leeds",      budget:80e6,  leagueId:2,
    contracts:[{id:3,salary:110000,start:"2024-01-01",end:"2028-06-30",status:"ACTIVE"}] },
  { id:4, name:"Hawks FC",   city:"Bristol",    budget:60e6,  leagueId:2,
    contracts:[{id:4,salary:58000,start:"2023-07-01",end:"2026-06-30",status:"ACTIVE"}] },
];

// ① Inheritance: Player IS-A Person  ④ Association: teamId reference
const players = [
  {id:1, name:"Marcus Silva",  initials:"MS",av:"av-1",pos:"FWD",teamId:1,age:24,nationality:"Brazil",    email:"marcus@fc.com",   status:"active",  rating:8.7, mv:42, mvHistory:[28,31,35,38,40,42], goals:18,assists:9, minutes:2700,yellows:2,reds:0, salary:"$85,000",contract:"2026"},
  {id:2, name:"James Okon",   initials:"JO",av:"av-2",pos:"MID",teamId:2,age:27,nationality:"Nigeria",    email:"james@city.com",  status:"active",  rating:7.2, mv:18, mvHistory:[20,20,19,18,18,18], goals:7, assists:11,minutes:2340,yellows:4,reds:0, salary:"$60,000",contract:"2025"},
  {id:3, name:"Lena Müller",  initials:"LM",av:"av-3",pos:"DEF",teamId:1,age:31,nationality:"Germany",    email:"lena@fc.com",     status:"injured", rating:6.9, mv:11, mvHistory:[15,14,13,12,11,11], goals:1, assists:3, minutes:1800,yellows:3,reds:0, salary:"$55,000",contract:"2027"},
  {id:4, name:"Karim Aït",   initials:"KA",av:"av-7",pos:"FWD",teamId:3,age:22,nationality:"Morocco",    email:"karim@rovers.com",status:"active",  rating:9.1, mv:65, mvHistory:[40,46,52,57,61,65], goals:25,assists:11,minutes:3060,yellows:1,reds:0, salary:"$110,000",contract:"2028"},
  {id:5, name:"Sara Pinto",   initials:"SP",av:"av-5",pos:"GK", teamId:2,age:29,nationality:"Portugal",   email:"sara@city.com",   status:"bench",   rating:7.8, mv:22, mvHistory:[21,22,23,22,21,22], goals:0, assists:0, minutes:2700,yellows:1,reds:0, salary:"$70,000",contract:"2025"},

/* ── Backend API (mirrors Java controllers) ──────────── */
const API = {

  // ── Players ──────────────────────────────────────────
  getPlayers()       { return [...players]; },
  getPlayer(id)      { return players.find(p=>p.id===id); },
  getPlayersByTeam(tid){ return players.filter(p=>p.teamId===tid); },

  createPlayer(data) {
    const p = { id: ++_pid, ...data,
      mvHistory: [data.mv], goals:0, assists:0, minutes:0, yellows:0, reds:0 };
    // ⑤ Dependency: use StatsService to set initial values
    p.rating = StatsService.calculateRating(0,0,0,0,0);
    p.mv     = StatsService.estimateMarketValue(p.rating, p.age, p.pos);
    players.push(p);
    return p;
  },

  updatePlayer(id, data) {
    const idx = players.findIndex(p=>p.id===id);
    if (idx < 0) throw new Error("Player not found");
    // ⑤ Dependency: recalculate via StatsService
    const updated = { ...players[idx], ...data };
    updated.rating = StatsService.calculateRating(
      updated.goals, updated.assists, updated.minutes, updated.yellows, updated.reds);
    updated.mv = StatsService.estimateMarketValue(updated.rating, updated.age, updated.pos);
    updated.mvHistory = [...(updated.mvHistory||[]), updated.mv];
    players[idx] = updated;
    return players[idx];
  },

  deletePlayer(id) {
    const idx = players.findIndex(p=>p.id===id);
    if (idx < 0) throw new Error("Player not found");
    players.splice(idx, 1);
    return true;
  },

  // ④ Association: transfer — just update teamId reference
  transferPlayer(playerId, newTeamId) {
    const p    = players.find(x=>x.id===playerId);
    const team = teams.find(t=>t.id===newTeamId);
    if (!p || !team) throw new Error("Player or team not found");
    const cost = p.mv * 1_000_000;
    if (team.budget < cost)
      throw new Error(`${team.name} budget insufficient. Need $${p.mv}M, have $${(team.budget/1e6).toFixed(1)}M`);
    team.budget -= cost;
    p.teamId = newTeamId;
    p.status = "active";
    // ⑤ Recalculate market value after transfer
    p.mv = StatsService.estimateMarketValue(p.rating, p.age, p.pos);
    p.mvHistory.push(p.mv);
    return p;
  },

  setMarketValue(playerId, valueMillion) {
    const p = players.find(x=>x.id===playerId);
    if (!p) throw new Error("Player not found");
    p.mv = valueMillion;
    p.mvHistory.push(valueMillion);
    return p;
  },

  // ── Leagues (② Aggregation) ───────────────────────────
  getLeagues()    { return [...leagues]; },
  getLeague(id)   { return leagues.find(l=>l.id===id); },

  createLeague(data) {
    const l = { id: ++_lid, ...data, teamIds:[] };
    leagues.push(l);
    return l;
  },

  // Edit league: name, country, season, division
  updateLeague(id, data) {
    const idx = leagues.findIndex(l=>l.id===id);
    if (idx < 0) throw new Error("League not found");
    leagues[idx] = { ...leagues[idx], ...data };
    return leagues[idx];
  },

  // ② Aggregation: delete league but teams survive
  deleteLeague(id) {
    const idx = leagues.findIndex(l=>l.id===id);
    if (idx < 0) throw new Error("League not found");
    // Teams survive — just clear their leagueId
    teams.forEach(t => { if (t.leagueId===id) t.leagueId = null; });
    leagues.splice(idx, 1);
    return true;
  },

  addTeamToLeague(leagueId, teamId) {
    const l = leagues.find(x=>x.id===leagueId);
    const t = teams.find(x=>x.id===teamId);
    if (!l||!t) throw new Error("League or team not found");
    if (!l.teamIds.includes(teamId)) l.teamIds.push(teamId);
    t.leagueId = leagueId;
    return l;
  },

  // ── Teams ─────────────────────────────────────────────
  getTeams()    { return [...teams]; },
  getTeam(id)   { return teams.find(t=>t.id===id); },
};

/* ── Helpers ───────────────────────────────────────── */
const maxMV = () => Math.max(...players.map(p=>p.mv), 1);
function mvTier(mv){ return mv>=40?{cls:'mv-high',label:'High'}:mv>=15?{cls:'mv-mid',label:'Mid'}:{cls:'mv-low',label:'Low'} }
function mvBarCls(mv){ return mv>=40?'bar-gold':mv>=15?'bar-amber':'bar-red' }
function statusDot(s){ const m={active:'dot-active',injured:'dot-injured',bench:'dot-bench'}; return `<span class="dot ${m[s]}"></span>${s[0].toUpperCase()+s.slice(1)}`}
function trendHTML(t){ return t>0?`<span class="trend-up"><i class="ti ti-trending-up" style="font-size:11px;vertical-align:-2px"></i> +$${t}M</span>`:t<0?`<span class="trend-down"><i class="ti ti-trending-down" style="font-size:11px;vertical-align:-2px"></i> $${t}M</span>`:`<span class="trend-flat">— stable</span>`}
function teamName(id){ const t=teams.find(x=>x.id===id); return t?t.name:'Free agent' }
function leagueName(id){ const l=leagues.find(x=>x.id===id); return l?l.name:'—' }
function teamLeague(teamId){ const t=teams.find(x=>x.id===teamId); return t?leagueName(t.leagueId):'—' }

  mc.innerHTML = `
    <div class="stats-row">

    </div>
    <div class="tabs">
      <div class="tab ${activeStatus==='all'?'active':''}" onclick="setTab(this,'all')">All players</div>
      <div class="tab ${activeStatus==='active'?'active':''}" onclick="setTab(this,'active')">Active</div>
      <div class="tab ${activeStatus==='injured'?'active':''}" onclick="setTab(this,'injured')">Injured</div>
      <div class="tab ${activeStatus==='bench'?'active':''}" onclick="setTab(this,'bench')">Bench</div>
    </div>
    <div class="filter-row">
      <span class="filter-label">Position:</span>
      ${['all','FWD','MID','DEF','GK'].map(p=>`<span class="pill ${activePos===p?'active':''}" onclick="setPos(this,'${p}')">${p==='all'?'All':p==='FWD'?'Forward':p==='MID'?'Midfielder':p==='DEF'?'Defender':'GK'}</span>`).join('')}
      <label for="sort-sel" class="filter-label" style="margin-inline-start:auto">Sort:</label>
      <select class="sort-select" id="sort-sel" onchange="renderGrid()">
        <option value="name">Name</option>
        <option value="mv-desc">Value ↓</option>

        <option value="rating">Rating ↓</option>
        <option value="age">Age ↑</option>
      </select>
    </div>
    <div class="players-grid" id="players-grid"></div>`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('players-grid');
  if (!grid) return;
  const q    = (document.getElementById('search-input')?.value||'').toLowerCase();
  const sort = document.getElementById('sort-sel')?.value||'name';
  const mm   = maxMV();
  let list   = API.getPlayers().filter(p=>{
    return (activePos==='all'||p.pos===activePos) &&
           (activeStatus==='all'||p.status===activeStatus) &&
           (!q||p.name.toLowerCase().includes(q)||teamName(p.teamId).toLowerCase().includes(q));
  });
  const sorters = { name:(a,b)=>a.name.localeCompare(b.name),'mv-desc':(a,b)=>b.mv-a.mv,'mv-asc':(a,b)=>a.mv-b.mv,rating:(a,b)=>b.rating-a.rating,age:(a,b)=>a.age-b.age };
  list = [...list].sort(sorters[sort]||sorters.name);
  grid.innerHTML = list.length ? list.map(p=>{
    const tier=mvTier(p.mv), pct=Math.round((p.mv/mm)*100), sel=selectedId===p.id?' selected':'';
    return `<div class="player-card${sel}" id="card-${p.id}" onclick="selectPlayer(${p.id})">
      <div class="player-header">
        <div class="avatar ${p.av}">${p.initials}</div>
        <div style="flex:1;min-inline-size:0"><div class="player-name">${p.name}</div><div class="player-pos">${p.pos} · ${teamName(p.teamId)}</div></div>
        <span class="mv-badge ${tier.cls}">$${p.mv}M</span>
      </div>
      <div class="card-meta">
        <div class="meta-row"><span class="meta-k">Status</span><span class="meta-v">${statusDot(p.status)}</span></div>
        <div class="meta-row"><span class="meta-k">Age</span><span class="meta-v">${p.age}</span></div>
        <div class="meta-row"><span class="meta-k">Rating</span><span class="meta-v">${p.rating}/10</span></div>
      </div>
      <div class="bar-wrap" style="margin-block-start:8px"><div class="bar-fill bar-green" style="inline-size:${p.rating*10}%"></div></div>
      <div class="meta-row" style="margin-block-start:8px"><span class="meta-k">Market value</span><span class="meta-v">${trendHTML(StatsService.valueTrend(p.mvHistory))}</span></div>
      <div class="bar-wrap" style="margin-block-start:3px"><div class="bar-fill ${mvBarCls(p.mv)}" style="inline-size:${pct}%"></div></div>
    </div>`;
  }).join('') : `<p style="color:var(--txt-muted);font-size:13px;grid-column:1/-1;padding:20px 0">No players match your filters.</p>`;
}

function savePlayer(id) {
  const data = {
    name:       document.getElementById('f-name').value.trim(),
    email:      document.getElementById('f-email').value.trim(),
    age:        parseInt(document.getElementById('f-age').value)||0,
    nationality:document.getElementById('f-nat').value.trim(),
    pos:        document.getElementById('f-pos').value,
    status:     document.getElementById('f-status').value,
    teamId:     parseInt(document.getElementById('f-team').value)||null,
    goals:      parseInt(document.getElementById('f-goals').value)||0,
    assists:    parseInt(document.getElementById('f-assists').value)||0,
    minutes:    parseInt(document.getElementById('f-minutes').value)||0,
    yellows:    parseInt(document.getElementById('f-yellows').value)||0,
    reds:       parseInt(document.getElementById('f-reds').value)||0,
  };
  if (!data.name) return alert('Name is required.');
  if (data.age<15||data.age>50) return alert('Age must be 15–50.');

  // Set initials and avatar
  const parts = data.name.split(' ');
  data.initials = (parts[0][0]+(parts[1]?parts[1][0]:'')).toUpperCase();
  const avs = ['av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8'];
  data.av = avs[Math.abs(data.name.charCodeAt(0)-65) % avs.length];
  data.salary = `$${(data.minutes/90*500).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',')}`;
  data.contract = String(new Date().getFullYear() + Math.floor(Math.random()*3+1));
  data.mv = data.mv || 0;

  try {
    if (id) {
      API.updatePlayer(id, data);
      closeModal();
      selectPlayer(id);
    } else {
      const created = API.createPlayer(data);
      closeModal();
      selectedId = created.id;
    }
    renderPlayersView(document.getElementById('main-content'));
  } catch(e) { alert(e.message); }
}

    <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div class="stat-label"><i class="ti ti-trophy"></i>Total leagues</div><div class="stat-value">${ls.length}</div></div>
      <div class="stat-card"><div class="stat-label"><i class="ti ti-shield"></i>Total teams</div><div class="stat-value">${teams.length}</div></div>
      <div class="stat-card"><div class="stat-label"><i class="ti ti-users"></i>Total players</div><div class="stat-value">${players.length}</div></div>
    </div>
    <div class="notice"><i class="ti ti-link" style="vertical-align:-2px"></i> Aggregation ② — Deleting a league does not delete its teams. Teams simply become league-free.</div>
    <div class="league-grid">
      ${ls.map(l=>{
        const lTeams = teams.filter(t=>t.leagueId===l.id);
        return `<div class="league-card">
          <div class="league-card-header">
            <div class="league-name"><i class="ti ti-trophy" style="color:var(--clr-gold);margin-inline-end:6px"></i>${l.name}</div>
            <div class="league-actions">
              <button class="btn btn-ghost btn-sm" onclick="openLeagueModal(${l.id})"><i class="ti ti-edit"></i> Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteLeague(${l.id})"><i class="ti ti-trash"></i></button>
            </div>
          </div>
          <div class="league-meta">
            <span><i class="ti ti-map-pin" style="font-size:12px;vertical-align:-2px"></i> ${l.country}</span>
            <span><i class="ti ti-calendar" style="font-size:12px;vertical-align:-2px"></i> ${l.season}</span>
            <span><i class="ti ti-award" style="font-size:12px;vertical-align:-2px"></i> Division ${l.division}</span>
            <span><i class="ti ti-shield" style="font-size:12px;vertical-align:-2px"></i> ${lTeams.length} team${lTeams.length!==1?'s':''}</span>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;margin-block-end:8px">
            ${lTeams.map(t=>`<span style="background:var(--clr-lift);border:1px solid var(--clr-border);border-radius:20px;padding:2px 10px;font-size:11px;color:var(--txt-secondary)">${t.name}</span>`).join('')||'<span style="font-size:12px;color:var(--txt-muted)">No teams assigned</span>'}
          </div>
          <div style="display:flex;gap:6px;align-items:center">
            <select class="sort-select" id="add-team-${l.id}" style="margin-inline-start:0">
              <option value="">Add a team…</option>
              ${teams.filter(t=>t.leagueId!==l.id).map(t=>`<option value="${t.id}">${t.name}</option>`).join('')}
            </select>
            <button class="btn btn-ghost btn-sm" onclick="addTeamToLeague(${l.id})">Add</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

function openLeagueModal(id) {
  const l = id ? API.getLeague(id) : null;
  document.getElementById('modal-title-text').textContent = l ? 'Edit League' : 'Add League';
  document.getElementById('modal-body').innerHTML = `
    <div class="form-group"><label class="form-label">League name</label><input class="form-input" id="l-name" value="${l?l.name:''}" placeholder="e.g. Premier League"></div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Country</label><input class="form-input" id="l-country" value="${l?l.country:''}" placeholder="e.g. England"></div>
      <div class="form-group"><label class="form-label">Season</label><input class="form-input" id="l-season" value="${l?l.season:'2025/26'}" placeholder="2025/26"></div>
    </div>
    <div class="form-group"><label class="form-label">Division</label>
      <select class="form-input" id="l-div">
        ${[1,2,3,4].map(d=>`<option value="${d}" ${l&&l.division===d?'selected':''}>Division ${d}</option>`).join('')}
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveLeague(${id||'null'})">${l?'Save changes':'Create league'}</button>
    </div>`;
  openModal();
}

function saveLeague(id) {
  const data = {
    name:     document.getElementById('l-name').value.trim(),
    country:  document.getElementById('l-country').value.trim(),
    season:   document.getElementById('l-season').value.trim(),
    division: parseInt(document.getElementById('l-div').value)||1,
  };
  if (!data.name)    return alert('League name is required.');
  if (!data.country) return alert('Country is required.');
  if (!data.season)  return alert('Season is required.');
  try {
    id ? API.updateLeague(id, data) : API.createLeague(data);
    closeModal();
    renderLeaguesView(document.getElementById('main-content'));
  } catch(e) { alert(e.message); }
}

function deleteLeague(id) {
  const l = API.getLeague(id);
  if (!confirm(`Delete "${l?.name}"? Teams will survive but become league-free (Aggregation ②).`)) return;
  API.deleteLeague(id);
  renderLeaguesView(document.getElementById('main-content'));
}

function addTeamToLeague(leagueId) {
  const sel = document.getElementById(`add-team-${leagueId}`);
  const tid = parseInt(sel.value);
  if (!tid) return;
  try { API.addTeamToLeague(leagueId, tid); renderLeaguesView(document.getElementById('main-content')); }
  catch(e) { alert(e.message); }
}

/* ═══════════════════════════════════════════════════════
   TRANSFER VIEW (④ Association + market value update)
═══════════════════════════════════════════════════════ */
function renderTransferView(mc) {
  const sortedByMV = [...API.getPlayers()].sort((a,b)=>b.mv-a.mv);
  mc.innerHTML = `
    <div class="notice"><i class="ti ti-arrows-exchange" style="vertical-align:-2px"></i> Association ④ — Transfer moves a player's teamId reference. Team budgets update automatically.</div>
    <div class="transfer-card">
      <div class="transfer-title"><i class="ti ti-send" style="color:var(--clr-accent)"></i>Execute Transfer</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Player</label>
          <select class="form-input" id="tr-player" onchange="previewTransfer()">
            <option value="">Select player…</option>
            ${sortedByMV.map(p=>`<option value="${p.id}">${p.name} ($${p.mv}M) — ${teamName(p.teamId)}</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">Destination team</label>
          <select class="form-input" id="tr-team" onchange="previewTransfer()">
            <option value="">Select team…</option>
            ${teams.map(t=>`<option value="${t.id}">${t.name} (Budget: $${(t.budget/1e6).toFixed(1)}M)</option>`).join('')}
          </select>
        </div>
      </div>
      <div id="tr-preview" style="margin-block-end:10px"></div>
      <button class="btn btn-primary" onclick="executeTransfer()"><i class="ti ti-send"></i> Execute transfer</button>
    </div>
    <div class="transfer-card">
      <div class="transfer-title"><i class="ti ti-currency-dollar" style="color:var(--clr-gold)"></i>Update Market Value</div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Player</label>
          <select class="form-input" id="mv-player">
            <option value="">Select player…</option>
            ${sortedByMV.map(p=>`<option value="${p.id}">${p.name} — current: $${p.mv}M</option>`).join('')}
          </select>
        </div>
        <div class="form-group"><label class="form-label">New market value ($M)</label>
          <input class="form-input" id="mv-val" type="number" min="0" step="0.5" placeholder="e.g. 45.5">
        </div>
      </div>
      <button class="btn btn-primary" onclick="applyTransferMV()"><i class="ti ti-check"></i> Update value</button>
    </div>
    <div class="transfer-card">
      <div class="transfer-title" style="margin-block-end:12px"><i class="ti ti-list" style="color:var(--clr-blue)"></i>Transfer Market — Top 10 by value</div>
      ${sortedByMV.slice(0,10).map((p,i)=>{
        const tier=mvTier(p.mv);
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-block-end:1px solid var(--clr-border)">
          <div style="font-size:12px;color:var(--txt-muted);inline-size:20px;text-align:center">${i+1}</div>
          <div class="avatar ${p.av}" style="inline-size:30px;block-size:30px;font-size:11px">${p.initials}</div>
          <div style="flex:1"><div style="font-size:13px;font-weight:600">${p.name}</div><div style="font-size:11px;color:var(--txt-muted)">${p.pos} · ${teamName(p.teamId)}</div></div>
          <span class="mv-badge ${tier.cls}">$${p.mv}M</span>
          <span style="font-size:11px">${trendHTML(StatsService.valueTrend(p.mvHistory))}</span>
        </div>`;
      }).join('')}
    </div>`;
}

function previewTransfer() {
  const pid  = parseInt(document.getElementById('tr-player').value);
  const tid  = parseInt(document.getElementById('tr-team').value);
  const prev = document.getElementById('tr-preview');
  if (!pid||!tid) { prev.innerHTML=''; return; }
  const p    = API.getPlayer(pid);
  const team = API.getTeam(tid);
  if (!p||!team) return;
  const cost  = p.mv*1e6;
  const ok    = team.budget >= cost;
  prev.innerHTML = `<div class="notice ${ok?'':'warn'}">
    <strong>${p.name}</strong> costs <strong>$${p.mv}M</strong>.
    ${team.name} budget: <strong>$${(team.budget/1e6).toFixed(1)}M</strong>.
    ${ok ? '✓ Transfer affordable.' : '✗ Insufficient budget!'}
  </div>`;
}

function executeTransfer() {
  const pid = parseInt(document.getElementById('tr-player').value);
  const tid = parseInt(document.getElementById('tr-team').value);
  if (!pid) return alert('Select a player.');
  if (!tid) return alert('Select a destination team.');
  try {
    const p = API.transferPlayer(pid, tid);
    alert(`✓ ${p.name} transferred to ${teamName(tid)}!`);
    renderTransferView(document.getElementById('main-content'));
  } catch(e) { alert('Transfer failed: ' + e.message); }
}

function applyTransferMV() {
  const pid = parseInt(document.getElementById('mv-player').value);
  const val = parseFloat(document.getElementById('mv-val').value);
  if (!pid) return alert('Select a player.');
  if (isNaN(val)||val<0) return alert('Enter a valid value in $M.');
  API.setMarketValue(pid, val);
  alert(`✓ Market value updated to $${val}M`);
  renderTransferView(document.getElementById('main-content'));
}

function openTransferModal() { showView('transfer', document.querySelector('.nav-item:nth-child(3)')); }
function openTransferModalFor(pid) {
  showView('transfer', null);
  setTimeout(()=>{ document.getElementById('tr-player').value=pid; previewTransfer(); }, 50);
}

/* ═══════════════════════════════════════════════════════
   CONTRACTS VIEW (③ Composition)
═══════════════════════════════════════════════════════ */
function renderContractsView(mc) {
  mc.innerHTML = `
    <div class="notice"><i class="ti ti-lock" style="vertical-align:-2px"></i> Composition ③ — Contracts are owned by Teams and cannot exist without them.</div>
    ${teams.map(t=>`
      <div class="league-card" style="margin-block-end:10px">
        <div class="league-card-header">
          <div class="league-name"><i class="ti ti-shield" style="color:var(--clr-blue);margin-inline-end:6px"></i>${t.name}</div>
          <span style="font-size:11px;color:var(--txt-muted)">Budget: $${(t.budget/1e6).toFixed(1)}M</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${t.contracts.map(c=>`
            <div style="display:flex;align-items:center;justify-content:space-between;background:var(--clr-lift);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px">
              <span style="color:var(--txt-muted)">Contract #${c.id}</span>
              <span>$${c.salary.toLocaleString()}/yr</span>
              <span style="color:var(--txt-muted)">${c.start} → ${c.end}</span>
              <span class="mv-badge ${c.status==='ACTIVE'?'mv-mid':'mv-low'}">${c.status}</span>
            </div>`).join('')||'<div style="font-size:12px;color:var(--txt-muted)">No contracts</div>'}
        </div>
      </div>`).join('')}`;
}

/* ═══════════════════════════════════════════════════════
   STATS VIEW
═══════════════════════════════════════════════════════ */
function renderStatsView(mc) {
  const ps = API.getPlayers().sort((a,b)=>b.rating-a.rating);
  const topScorer  = [...ps].sort((a,b)=>b.goals-a.goals)[0];
  const topAssist  = [...ps].sort((a,b)=>b.assists-a.assists)[0];
  const topValue   = [...ps].sort((a,b)=>b.mv-a.mv)[0];
  mc.innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label"><i class="ti ti-ball-football"></i>Top scorer</div><div class="stat-value">${topScorer.goals}</div><div class="stat-sub">${topScorer.name}</div></div>
      <div class="stat-card"><div class="stat-label"><i class="ti ti-arrow-guide"></i>Top assists</div><div class="stat-value">${topAssist.assists}</div><div class="stat-sub">${topAssist.name}</div></div>
      <div class="stat-card"><div class="stat-label"><i class="ti ti-currency-dollar"></i>Highest value</div><div class="stat-value">$${topValue.mv}M</div><div class="stat-sub">${topValue.name}</div></div>
      <div class="stat-card"><div class="stat-label"><i class="ti ti-users"></i>Squad size</div><div class="stat-value">${ps.length}</div><div class="stat-sub">across ${teams.length} teams</div></div>
    </div>
    <div style="background:var(--clr-surface);border:1px solid var(--clr-border);border-radius:var(--radius-md);overflow:hidden">
      <table style="inline-size:100%;border-collapse:collapse;font-size:12px">
        <thead>
          <tr style="border-block-end:1px solid var(--clr-border)">
            ${['#','Player','Pos','Team','Rating','Goals','Assists','Mins','Value'].map(h=>`<th style="padding:10px 12px;text-align:left;color:var(--txt-muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.05em">${h}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${ps.map((p,i)=>`<tr style="border-block-end:1px solid var(--clr-border);transition:background .1s" onmouseover="this.style.background='var(--clr-lift)'" onmouseout="this.style.background=''">
            <td style="padding:9px 12px;color:var(--txt-muted)">${i+1}</td>
            <td style="padding:9px 12px"><div style="display:flex;align-items:center;gap:8px"><div class="avatar ${p.av}" style="inline-size:26px;block-size:26px;font-size:10px">${p.initials}</div>${p.name}</div></td>
            <td style="padding:9px 12px;color:var(--txt-muted)">${p.pos}</td>
            <td style="padding:9px 12px;color:var(--txt-muted)">${teamName(p.teamId)}</td>
            <td style="padding:9px 12px;font-weight:600;color:${p.rating>=8?'var(--clr-accent)':p.rating>=6?'var(--txt-primary)':'var(--clr-red)'}">${p.rating}</td>
            <td style="padding:9px 12px">${p.goals}</td>
            <td style="padding:9px 12px">${p.assists}</td>
            <td style="padding:9px 12px;color:var(--txt-muted)">${p.minutes.toLocaleString()}</td>
            <td style="padding:9px 12px"><span class="mv-badge ${mvTier(p.mv).cls}">$${p.mv}M</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

/* ── Modal helpers ─────────────────────────────────── */
function openModal()  { document.getElementById('modal-bg').classList.add('open'); }
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function closeModalOnBg(e){ if(e.target===document.getElementById('modal-bg')) closeModal(); }

/* ── Boot ──────────────────────────────────────────── */
showView('players', document.querySelector('.nav-item'));
</script>
</body>
</html>
